# V35 Phase 1: Representation learning (NO FLOPS)
#
# Learn from BGE-M3 teacher with hard negatives.
# Model will become dense - that's intentional.
# Phase 2 will compress back to sparse.
#
# From V33 checkpoint -> learn better representations

model:
  name: "skt/A.X-Encoder-base"
  dropout: 0.1

loss:
  lambda_q: 0.0                   # NO FLOPS in Phase 1
  lambda_d: 0.0
  lambda_neg: 0.0
  temperature: 1.0
  flops_warmup_steps: 0
  lambda_kd: 0.0
  kd_temperature: 1.0
  lambda_margin_mse: 0.5          # Full KD from BGE-M3
  lambda_initial_ratio: 0.0

data:
  train_files:
    - "data/v29.0_multi_neg/train_*.jsonl"
  val_files:
    - "data/v29.0_multi_neg/val.jsonl"
  batch_size: 16
  query_max_length: 64
  doc_max_length: 256
  num_workers: 4
  num_hard_negatives: 7

training:
  num_epochs: 5
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  gradient_clip: 1.0
  gradient_accumulation_steps: 16
  mixed_precision: "bf16"
  output_dir: "outputs/train_v35_phase1"
  log_every_n_steps: 50
  save_every_n_epochs: 5
  seed: 42

# V35 Phase 2: Sparsity compression (FLOPS only, NO KD)
#
# From Phase 1 checkpoint (dense but better representations).
# Compress back to V33-level sparsity using FLOPS.
# InfoNCE with hard negatives maintains ranking quality.
# No MarginMSE = no dense teacher pressure.
#
# Target: nz_q<50, nz_d<80

model:
  name: "skt/A.X-Encoder-base"
  dropout: 0.1

loss:
  lambda_q: 0.01                  # V33-level FLOPS
  lambda_d: 0.003
  lambda_neg: 0.003               # Same as lambda_d
  temperature: 1.0
  flops_warmup_steps: 2000        # Quick warmup (model already trained)
  lambda_kd: 0.0
  kd_temperature: 1.0
  lambda_margin_mse: 0.0          # NO KD in Phase 2
  lambda_initial_ratio: 0.5       # Start at 50%

data:
  train_files:
    - "data/v29.0_multi_neg/train_*.jsonl"
  val_files:
    - "data/v29.0_multi_neg/val.jsonl"
  batch_size: 16
  query_max_length: 64
  doc_max_length: 256
  num_workers: 4
  num_hard_negatives: 7

training:
  num_epochs: 10
  learning_rate: 5.0e-6           # Lower LR for fine-tuning
  weight_decay: 0.01
  warmup_ratio: 0.05
  gradient_clip: 1.0
  gradient_accumulation_steps: 16
  mixed_precision: "bf16"
  output_dir: "outputs/train_v35_phase2"
  log_every_n_steps: 50
  save_every_n_epochs: 5
  seed: 42
